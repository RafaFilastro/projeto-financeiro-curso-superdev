<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>TechFix - Vendas</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header>
      <h1>TechFix</h1>
      <p>Sistema de Assistência Técnica</p>
      <nav>
        <a href="index.html">Inicio</a>
        <a href="orcamentos.html">Orçamentos</a>
      </nav>
    </header>
    <main>
      <section class="card">
        <h2>Venda</h2>
        <form id="formVenda">
          <label>Produto</label>
          <select id="produto">
            <option value="">Selecione um produto...</option>
            <option>SSD</option>
            <option>HD</option>
            <option>Memória RAM</option>
            <option>Fonte</option>
            <option>Mouse</option>
            <option>Teclado</option>
            <option>Monitor</option>
            <option>Placa de Rede</option>
          </select>
          <label>Quantidade</label>
          <input type="number" id="quantidade" min="1" required />
          <label>Valor Total (R$)</label>
          <input type="number" id="valorTotal" min="0" step="0.01" required />
          <button id="btnSalvar" type="submit">Salvar Venda</button>
        </form>
      </section>
      <section class="card">
        <h2>Vendas Cadastradas</h2>
        <table>
          <thead>
            <tr>
              <th>Produto</th>
              <th>Qtd</th>
              <th>Valor Total</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabelaVendas"></tbody>
        </table>
      </section>
    </main>
    <script src="assets/js/vendas.js"></script>
  </body>
</html>
